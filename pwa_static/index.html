<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1a2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Toon</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#0f1a2a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overscroll-behavior:none}
  body{display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  header{padding:18px 22px 8px;display:flex;justify-content:space-between;align-items:center}
  header h1{font-size:18px;font-weight:500;color:#88aabb}
  #conn{font-size:12px;color:#5a8;background:#0a3a1a;padding:2px 8px;border-radius:10px}
  #conn.bad{color:#f88;background:#3a0a0a}
  main{flex:1;padding:20px 22px;overflow-y:auto}
  .card{background:#1a2a44;border-radius:16px;padding:20px;margin-bottom:14px}
  .card h2{font-size:14px;color:#88aabb;text-transform:uppercase;letter-spacing:0.5px;font-weight:500;margin-bottom:12px}
  .row{display:flex;justify-content:space-between;align-items:baseline;margin:8px 0}
  .row .v{font-size:18px;color:#ffcc44}
  #temp{font-size:96px;font-weight:200;color:#ffcc44;text-align:center;line-height:1}
  #sp{font-size:24px;color:#a8c4dc;text-align:center;margin:6px 0 18px}
  .sp-ctl{display:flex;gap:10px;justify-content:center;margin-bottom:8px}
  .sp-ctl button{flex:1;max-width:120px;height:64px;border:0;border-radius:14px;background:#2a4060;color:#fff;font-size:36px;cursor:pointer;touch-action:manipulation}
  .sp-ctl button:active{background:#3a5070}
  .badge{display:inline-block;padding:4px 12px;border-radius:10px;font-size:14px;margin:2px 4px}
  .badge.idle{background:#1a2a44;color:#88aabb}
  .badge.fire{background:#3a1a0a;color:#ff8844}
  .badge.dhw{background:#0a2a3a;color:#44aaff}
  .ct-ctl{display:flex;gap:8px;margin-top:12px}
  .ct-ctl button{flex:1;height:48px;border:0;border-radius:10px;background:#2a4060;color:#fff;font-size:16px;cursor:pointer}
  .ct-ctl button:active{background:#3a5070}
  .progs{display:flex;gap:6px;margin-top:10px}
  .progs button{flex:1;height:42px;border:0;border-radius:8px;background:#1a2a44;color:#88aabb;font-size:14px;cursor:pointer}
  .progs button.active{background:#2a4060;color:#fff}
  footer{padding:8px 22px 16px;font-size:11px;color:#5a7895;text-align:center}
  .pkg-count{font-size:14px;color:#ffcc44;font-weight:600;margin-left:6px}
  .pkg-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
  .pkg{background:#0f1a2a;border-radius:10px;padding:10px 12px;display:flex;
       flex-direction:column;gap:4px;border-left:3px solid #3a6090}
  .pkg.received{border-left-color:#5a8;opacity:0.75}
  .pkg.today{border-left-color:#ffaa44}
  .pkg-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .pkg-label{font-size:16px;color:#fff;flex:1}
  .pkg-eta{font-size:13px;color:#88aabb;white-space:nowrap}
  .pkg-meta{font-size:12px;color:#a8c4dc}
  .pkg-meta .arrow{color:#5a8;margin:0 4px}
  .pkg-ctl{display:flex;gap:6px;margin-top:6px}
  .pkg-ctl button{flex:1;height:34px;border:0;border-radius:8px;
                  background:#2a4060;color:#fff;font-size:13px;cursor:pointer}
  .pkg-ctl button.danger{background:#3a1a0a;color:#f88}
  .pkg-ctl button:active{background:#3a5070}
  .pkg-add{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  .pkg-add input,.pkg-add select{padding:10px;background:#0f1a2a;border:1px solid #2a4060;
                 border-radius:8px;color:#fff;font-size:14px;font-family:inherit;
                 min-width:0}
  .pkg-add input[type="date"]{color-scheme:dark}
  .pkg-add button{background:#3a6090;color:#fff;border:0;border-radius:8px;
                  font-size:14px;cursor:pointer;grid-column:span 2;height:42px}
  /* Layout: label full-width, then ETA+place, tracking+postal, then URL full-width */
  #pkg-label, #pkg-url { grid-column: span 2 }
</style>
</head>
<body>
<header>
  <h1>Toon — Woonkamer</h1>
  <div style="display:flex;align-items:center;gap:10px">
    <span id="conn">…</span>
    <a id="settings-link" href="/settings" title="Instellingen"
       style="text-decoration:none;font-size:20px;color:#88aabb">⚙</a>
  </div>
</header>
<main>
  <div class="card">
    <div id="temp">--.- °C</div>
    <div id="sp">setpoint --.- °C</div>
    <div class="sp-ctl">
      <button id="dec">−</button>
      <button id="inc">＋</button>
    </div>
    <div style="text-align:center;margin-top:8px">
      <span id="badges"></span>
    </div>
  </div>

  <div class="card">
    <h2>Boiler</h2>
    <div class="row"><span>Modulation</span><span class="v" id="mod">--%</span></div>
    <div class="row"><span>Flow</span><span class="v" id="bo">--.-°C</span></div>
    <div class="row"><span>Return</span><span class="v" id="br">--.-°C</span></div>
    <div class="row"><span>CH setpoint</span><span class="v" id="chsp">--.-°C</span></div>
    <div class="row"><span>Water pressure</span><span class="v" id="wp">--.-bar</span></div>
  </div>

  <div class="card">
    <h2>Air</h2>
    <div class="row"><span>Humidity</span><span class="v" id="hum">--%</span></div>
    <div class="row"><span>eCO2</span><span class="v" id="eco2">-- ppm</span></div>
    <div class="row"><span>TVOC</span><span class="v" id="tvoc">-- ppb</span></div>
  </div>

  <div class="card">
    <h2>Program</h2>
    <div class="progs">
      <button data-p="0">Comfort</button>
      <button data-p="1">Home</button>
      <button data-p="2">Sleep</button>
      <button data-p="3">Away</button>
    </div>
  </div>

  <div class="card" id="card-curtains" style="display:none">
    <h2>Curtains</h2>
    <div class="row"><span id="ct-st">--</span><span class="v" id="ct-bat">--%</span></div>
    <div class="ct-ctl">
      <button onclick="curtain('open')">Open</button>
      <button onclick="curtain('stop')">Stop</button>
      <button onclick="curtain('close')">Close</button>
    </div>
  </div>

  <div class="card">
    <h2>Pakketten <span id="pkg-count" class="pkg-count"></span></h2>
    <div id="pkg-list" class="pkg-list"></div>
    <div class="pkg-add">
      <input id="pkg-label"    placeholder="Wat (bv. Bol.com - boek)" />
      <input id="pkg-eta"      type="date" />
      <input id="pkg-place"    placeholder="Plek (bv. voorhal)" />
      <input id="pkg-tracking" placeholder="Tracking nr (optie)" />
      <input id="pkg-postal"   placeholder="Postcode (verificatie)" />
      <select id="pkg-carrier">
        <option value="">Vervoerder (auto-URL)…</option>
        <option value="postnl">PostNL</option>
        <option value="dhl">DHL</option>
        <option value="dpd">DPD</option>
        <option value="gls">GLS</option>
        <option value="ups">UPS</option>
        <option value="fedex">FedEx</option>
        <option value="bpost">bpost</option>
      </select>
      <input id="pkg-url"      placeholder="Track URL (auto uit vervoerder, of zelf {pc})" />
      <button id="pkg-add-btn">Voeg toe</button>
    </div>
  </div>
</main>
<footer>SSE stream · pushes on change + 10s keepalive</footer>
<script src="/app.js"></script>
</body>
</html>
