<!doctype html>
<!--
  Custom Emscripten shell for freetoon-WASM.

  Emscripten replaces {{{ SCRIPT }}} with the generated <script> tag that loads
  index.js / index.wasm and wires the canvas. We provide:
    - a full-viewport canvas (LVGL's SDL backend renders into #canvas)
    - a slim JS bridge that, when configured, opens an EventSource against the
      master Toon's /api/state/stream and pushes each frame into the WASM
      module via Module.ccall('wasm_push_state', ...)
    - control writes via fetch() POST to /api/setpoint, /api/program,
      /api/curtain (same endpoints the existing PWA uses)
-->
<html lang="nl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>freetoon</title>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #000;
                      overflow: hidden; touch-action: none; }
        /* Centre the canvas and display it at its native 1024x600 AT MOST,
           scaling DOWN (aspect-preserving) to fit smaller screens — phone,
           tablet, or a Toon 1 browser. Never upscale past native, so a large
           desktop monitor shows it crisp and letterboxed instead of stretched
           full-screen. width/height each clamp to viewport, native size, and
           the other axis via the 1024:600 ratio, so both stay in lock-step. */
        body { display: flex; align-items: center; justify-content: center; }
        #canvas { display: block; outline: none;
                  width:  min(100vw, 1024px, 100vh * 1024 / 600);
                  height: min(100vh,  600px, 100vw * 600 / 1024); }
        /* Slave-bridge status — top-centre, above the LVGL "tap to wake" hint
           on dim. Same 12px size kept on purpose; pointer-events:none so taps
           on the canvas under it still register. */
        #status { position: fixed; left: 50%; transform: translateX(-50%); top: 4px;
                  color: #888; font: 12px/1.2 system-ui, sans-serif;
                  pointer-events: none; white-space: nowrap; }
        /* Logout — small fixed top-right button. pointer-events:auto (the
           parent #status above is the only "pointer-events:none" element)
           so the tap reaches the link. Visible only when login is on; the
           master's pwa_server handles the actual session teardown. */
        #logout { position: fixed; top: 6px; right: 10px;
                  color: #aaa; background: rgba(0,0,0,0.35);
                  font: 12px/1.2 system-ui, sans-serif;
                  text-decoration: none; padding: 4px 10px;
                  border-radius: 12px; z-index: 10; }
        #logout:hover { color: #fff; background: rgba(0,0,0,0.55); }
    </style>
</head>
<body>
    <canvas id="canvas" tabindex="0" oncontextmenu="event.preventDefault()"></canvas>
    <div id="status">starting…</div>
    <a id="logout" href="/logout" title="Sign out">⏻ logout</a>

    <script>
    // ─── slave-mode bridge config ────────────────────────────────────────────
    // If served from the master Toon's pwa_server (http://<toon>:10081/ui/),
    // the API endpoints are same-origin — leave MASTER empty. If served
    // elsewhere, set MASTER to e.g. "http://192.168.3.212:10081" (the master
    // Toon must then allow CORS for this origin).
    const MASTER = "";
    const statusEl = document.getElementById('status');
    const setStatus = (s) => { statusEl.textContent = s; };

    // ─── Emscripten Module ───────────────────────────────────────────────────
    // preRun: hold main() until we've fetched the master Toon's cached
    // Buienradar radar GIF into MEMFS at /tmp/toonui_radar.gif, so the
    // forecast screen's lv_gif_set_src("S:/tmp/toonui_radar.gif") finds it.
    var Module = {
        canvas: (function () { return document.getElementById('canvas'); })(),
        print:    (text) => console.log(text),
        printErr: (text) => console.warn(text),
        preRun: [function () {
            Module.addRunDependency('radar-gif');
            fetch(MASTER + '/api/radar.gif')
                .then(r => r.ok ? r.arrayBuffer() : Promise.reject(r.status))
                .then(buf => {
                    try { FS.mkdirTree('/tmp'); } catch (e) {}
                    FS.writeFile('/tmp/toonui_radar.gif', new Uint8Array(buf));
                    console.log('[radar] cached', buf.byteLength, 'bytes');
                })
                .catch(e => console.warn('[radar] fetch failed:', e))
                .finally(() => Module.removeRunDependency('radar-gif'));
        }],
        onRuntimeInitialized: () => {
            setStatus('ui ready');
            startSlaveBridge();
            // Periodic radar refresh — overwrite the MEMFS file every 10 min so
            // the next forecast-screen open shows a fresh radar loop. (LVGL
            // caches the gif on set_src so the open screen keeps the old one
            // until the user navigates back in.)
            setInterval(function () {
                fetch(MASTER + '/api/radar.gif')
                    .then(r => r.ok ? r.arrayBuffer() : Promise.reject(r.status))
                    .then(buf => FS.writeFile('/tmp/toonui_radar.gif', new Uint8Array(buf)));
            }, 10 * 60 * 1000);
        }
    };

    // ─── slave-mode bridge ───────────────────────────────────────────────────
    let sse = null;
    function startSlaveBridge() {
        const url = MASTER + '/api/state/stream';
        try {
            sse = new EventSource(url);
        } catch (e) {
            setStatus('no master @ ' + url);
            return;
        }
        sse.onopen = () => setStatus('master: connected');
        sse.onerror = () => setStatus('master: reconnecting…');
        sse.onmessage = (ev) => {
            // Each SSE frame is a JSON snapshot of toon_state/ha_state. Hand it
            // to the WASM side where Phase 2 parsing will update the structs.
            try {
                Module.ccall('wasm_push_state', null, ['string'], [ev.data]);
            } catch (e) {
                console.warn('wasm_push_state failed:', e);
            }
        };
    }

    // ─── control writes (called from the LVGL UI via wasm_push_event) ───────
    window.ftPost = function (path, body) {
        return fetch(MASTER + path, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(body)
        });
    };
    </script>

    {{{ SCRIPT }}}
</body>
</html>
